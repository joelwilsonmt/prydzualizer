<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#000005"/>
  <!-- Waveform bars, centered vertically at y=16, varying heights -->
  <rect x="2"  y="15" width="2" height="2"  fill="#0033aa" rx="1"/>
  <rect x="5"  y="13" width="2" height="6"  fill="#0055cc" rx="1"/>
  <rect x="8"  y="9"  width="2" height="14" fill="#0088ee" rx="1"/>
  <rect x="11" y="6"  width="2" height="20" fill="#00ccff" rx="1"/>
  <rect x="14" y="10" width="2" height="12" fill="#00ddff" rx="1"/>
  <rect x="17" y="7"  width="2" height="18" fill="#00ccff" rx="1"/>
  <rect x="20" y="11" width="2" height="10" fill="#0088ee" rx="1"/>
  <rect x="23" y="13" width="2" height="6"  fill="#0055cc" rx="1"/>
  <rect x="26" y="15" width="2" height="2"  fill="#0033aa" rx="1"/>
  <!-- Subtle center line -->
  <rect x="0" y="15" width="32" height="1" fill="#00aaff" opacity="0.15"/>
</svg>
